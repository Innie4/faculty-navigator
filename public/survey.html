<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FindMyBlock — Survey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="survey">
  <div class="survey-page">
    <header class="survey-header">
      <h1>SURVEY</h1>
      <a href="/" class="back-btn">&#8592; BACK</a>
    </header>

    <!-- ── Live GPS readout ────────────────────────────── -->
    <div class="gps-readout" id="gps-readout">
      <div class="gps-coords" id="gps-coords">
        <span id="gps-lat">--</span>&deg;N<br />
        <span id="gps-lng">--</span>&deg;E
      </div>
      <div class="gps-accuracy" id="gps-accuracy">Accuracy: -- m</div>
      <div class="gps-status-msg" id="gps-status">Waiting for GPS…</div>
    </div>

    <!-- ── Capture form ────────────────────────────────── -->
    <form class="capture-form" id="capture-form">
      <label for="point-name">Point name</label>
      <input type="text" id="point-name" placeholder="e.g. CSC Block Entrance A" autocomplete="off" />

      <label for="point-type">Type</label>
      <select id="point-type">
        <option value="building_entrance">Building Entrance</option>
        <option value="junction">Junction</option>
        <option value="gate">Gate</option>
        <option value="turning_point">Turning Point</option>
      </select>

      <button type="submit" class="capture-btn" id="capture-btn">CAPTURE POINT</button>
    </form>

    <!-- ── Connect toggle ───────────────────────────────── -->
    <div class="connect-toggle" id="connect-toggle" style="display:none;">
      <input type="checkbox" id="connect-check" checked />
      <label for="connect-check">Connect to previous point</label>
      <select id="connect-surface">
        <option value="paved">Paved</option>
        <option value="earthen">Earthen</option>
      </select>
    </div>

    <!-- ── Captured points list ─────────────────────────── -->
    <div class="capture-list" id="capture-list">
      <h2>CAPTURED POINTS</h2>
      <div id="capture-items">
        <div style="padding:var(--space-sm);color:var(--color-muted);font-size:0.82rem;">
          No points captured yet.
        </div>
      </div>
    </div>

    <!-- ── Action buttons ───────────────────────────────── -->
    <div class="action-row">
      <button class="save-btn" id="save-btn" disabled>SAVE ALL TO DATABASE</button>
      <button class="undo-btn" id="undo-btn" disabled>UNDO</button>
    </div>

    <div id="save-result"></div>

    <div style="margin-top:var(--space-sm);padding:var(--space-xs) var(--space-sm);border:2px solid var(--color-border);background:var(--color-surface);font-size:0.75rem;display:flex;gap:var(--space-xs);align-items:center;">
      <label for="survey-api-key" style="font-family:var(--font-display);font-size:0.6rem;letter-spacing:0.08em;">API KEY</label>
      <input type="text" id="survey-api-key" placeholder="Leave empty if unset" autocomplete="off" style="flex:1;padding:4px 8px;font-family:var(--font-body);font-size:0.8rem;border:2px solid var(--color-border);background:var(--color-bg);" />
      <span id="survey-api-status" style="font-size:0.65rem;font-weight:700;">?</span>
    </div>

    <!-- ── Admin Panel Toggle ──────────────────────────────── -->
    <div style="margin-top:var(--space-md);text-align:center;">
      <button id="admin-toggle-btn" class="capture-btn" style="width:auto;padding:var(--space-xs) var(--space-md);font-size:0.85rem;">SHOW ADMIN PANEL</button>
    </div>

    <div id="survey-admin-panel" style="display:none;">
      <!-- ── Stats ─────────────────────────────────────── -->
      <div class="stats-row" id="survey-stats" style="margin-top:var(--space-md);">
        <div class="stat-card"><span class="stat-number" id="s-stat-nodes">--</span><span class="stat-label">Nodes</span></div>
        <div class="stat-card"><span class="stat-number" id="s-stat-edges">--</span><span class="stat-label">Edges</span></div>
        <div class="stat-card"><span class="stat-number" id="s-stat-pois">--</span><span class="stat-label">POIs</span></div>
        <div class="stat-card" id="s-stat-iso-card"><span class="stat-number" id="s-stat-iso">--</span><span class="stat-label">Isolated</span></div>
      </div>

      <!-- ── Nodes table ────────────────────────────────── -->
      <div class="admin-section">
        <h2>NODES</h2>
        <div style="overflow-x:auto;">
          <table class="admin-table" id="s-nodes-table">
            <thead>
              <tr><th>ID</th><th>Name</th><th>Type</th><th>Lat</th><th>Lng</th><th></th></tr>
            </thead>
            <tbody id="s-nodes-body"></tbody>
          </table>
        </div>
      </div>

      <!-- ── Edges table ────────────────────────────────── -->
      <div class="admin-section">
        <h2>EDGES</h2>
        <div style="overflow-x:auto;">
          <table class="admin-table" id="s-edges-table">
            <thead>
              <tr><th>ID</th><th>From</th><th>To</th><th>Weight</th><th>Surface</th><th></th></tr>
            </thead>
            <tbody id="s-edges-body"></tbody>
          </table>
        </div>
      </div>

      <!-- ── POIs table + form ──────────────────────────── -->
      <div class="admin-section">
        <h2>POINTS OF INTEREST</h2>
        <div style="overflow-x:auto;">
          <table class="admin-table" id="s-pois-table">
            <thead>
              <tr><th>ID</th><th>Name</th><th>Node</th><th></th></tr>
            </thead>
            <tbody id="s-pois-body"></tbody>
          </table>
        </div>
        <form class="admin-poi-form" id="s-poi-form" style="border-top:var(--border-medium);">
          <div>
            <label for="s-poi-node">Node</label>
            <select id="s-poi-node"></select>
          </div>
          <div>
            <label for="s-poi-name">POI name</label>
            <input type="text" id="s-poi-name" placeholder="e.g. Department of Computer Science" />
          </div>
          <button type="submit" class="inline-btn">ADD POI</button>
        </form>
      </div>

      <!-- ── Connectivity + Export ──────────────────────── -->
      <div class="admin-section">
        <h2>CONNECTIVITY</h2>
        <div class="connectivity-list" id="s-conn-list"><p>Loading…</p></div>
      </div>

      <div class="admin-section">
        <h2>EXPORT</h2>
        <div style="padding:var(--space-sm);">
          <a href="/api/export" target="_blank"
             style="font-family:var(--font-display);font-size:0.85rem;letter-spacing:0.06em;
                    text-transform:uppercase;border:var(--border-thick);padding:var(--space-xs) var(--space-sm);
                    background:var(--color-text);color:var(--color-surface);display:inline-block;">
            DOWNLOAD JSON BACKUP
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ============================================================
       survey.js — Field coordinate-capture tool
       Works offline for the capture step; only needs a network
       connection at "Save All to Database" time.
       ============================================================ */

    // ── State ────────────────────────────────────────────
    var capturedNodes = [];   // { id, name, lat, lng, type, accuracy, ts }
    var capturedEdges = [];   // { from_node_id, to_node_id, surface_type }
    var gpsWatchId = null;
    var currentLat = null;
    var currentLng = null;
    var currentAccuracy = null;

    // ── DOM refs ─────────────────────────────────────────
    var $ = function (id) { return document.getElementById(id); };
    var latEl = $('gps-lat');
    var lngEl = $('gps-lng');
    var accEl = $('gps-accuracy');
    var statusEl = $('gps-status');
    var pointName = $('point-name');
    var pointType = $('point-type');
    var captureBtn = $('capture-btn');
    var captureForm = $('capture-form');
    var connectToggle = $('connect-toggle');
    var connectCheck = $('connect-check');
    var connectSurface = $('connect-surface');
    var captureItems = $('capture-items');
    var saveBtn = $('save-btn');
    var undoBtn = $('undo-btn');
    var saveResult = $('save-result');

    // ── API key for write auth ──────────────────────────
    var surveyApiKey = '';

    $('survey-api-key').addEventListener('input', function () {
      surveyApiKey = this.value.trim();
      $('survey-api-status').textContent = surveyApiKey ? 'KEY SET' : 'OPEN';
    });

    function surveyAuthHeaders() {
      var h = { 'Content-Type': 'application/json' };
      if (surveyApiKey) h['x-api-key'] = surveyApiKey;
      return h;
    }

    // ── Generate a URL-friendly ID from a name ───────────
    function makeId(name) {
      return name
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '_')
        .replace(/^_|_$/g, '') || 'point_' + Date.now();
    }

    // ── Render the captured points list ──────────────────
    function renderList() {
      if (capturedNodes.length === 0) {
        captureItems.innerHTML =
          '<div style="padding:var(--space-sm);color:var(--color-muted);font-size:0.82rem;">' +
          'No points captured yet.</div>';
        saveBtn.disabled = true;
        undoBtn.disabled = true;
        connectToggle.style.display = 'none';
        return;
      }

      saveBtn.disabled = false;
      undoBtn.disabled = false;
      saveBtn.textContent = 'SAVE ALL TO DATABASE (' + capturedNodes.length + ' pts, ' +
        capturedEdges.length + ' edges)';

      // Show connect toggle when we have 2+ points
      if (capturedNodes.length >= 2) {
        connectToggle.style.display = 'flex';
      }

      var html = '';
      for (var i = 0; i < capturedNodes.length; i++) {
        var n = capturedNodes[i];
        html += '<div class="capture-item">';
        html += '<span class="ci-name">' + escapeHtml(n.name) + '</span>';
        html += ' <span class="ci-type">(' + n.type.replace('_', ' ') + ')</span>';
        html += '<br /><span class="ci-coords">' +
          n.lat.toFixed(5) + ', ' + n.lng.toFixed(5) +
          ' &plusmn;' + Math.round(n.accuracy) + 'm</span>';

        // Find edges that start from this node
        for (var j = 0; j < capturedEdges.length; j++) {
          var e = capturedEdges[j];
          if (e.from_node_id === n.id) {
            var toNode = capturedNodes.find(function (x) { return x.id === e.to_node_id; });
            if (toNode) {
              html += '<span class="ci-edge">' +
                escapeHtml(e.surface_type) + ' → ' +
                escapeHtml(toNode.name) + '</span>';
            }
          }
        }

        html += '</div>';
      }
      captureItems.innerHTML = html;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Capture the current point ────────────────────────
    captureForm.addEventListener('submit', function (e) {
      e.preventDefault();

      var nameVal = pointName.value.trim();
      if (!nameVal) {
        alert('Enter a name for this point.');
        return;
      }
      if (currentLat === null || currentLng === null) {
        alert('Waiting for GPS fix. Stand outside where the phone can see the sky.');
        return;
      }

      var id = makeId(nameVal);
      // Ensure unique ID within session
      var suffix = 1;
      var origId = id;
      while (capturedNodes.some(function (n) { return n.id === id; })) {
        id = origId + '_' + suffix++;
      }

      var node = {
        id: id,
        name: nameVal,
        lat: currentLat,
        lng: currentLng,
        type: pointType.value,
        accuracy: currentAccuracy,
        ts: new Date().toISOString()
      };

      // Create edge to previous node if toggle is on
      if (connectCheck.checked && capturedNodes.length > 0) {
        var prev = capturedNodes[capturedNodes.length - 1];
        capturedEdges.push({
          from_node_id: prev.id,
          to_node_id: id,
          surface_type: connectSurface.value
        });
      }

      capturedNodes.push(node);
      pointName.value = '';
      pointName.focus();
      renderList();
    });

    // ── Undo last capture ────────────────────────────────
    undoBtn.addEventListener('click', function () {
      if (capturedNodes.length === 0) return;

      var removed = capturedNodes.pop();
      // Remove edges referencing the removed node
      capturedEdges = capturedEdges.filter(function (e) {
        return e.from_node_id !== removed.id && e.to_node_id !== removed.id;
      });
      renderList();
    });

    // ── Save to database ─────────────────────────────────
    saveBtn.addEventListener('click', function () {
      if (capturedNodes.length === 0) return;

      saveBtn.disabled = true;
      saveBtn.textContent = 'SAVING…';
      saveResult.innerHTML = '';

      var payload = {
        nodes: capturedNodes.map(function (n) {
          return { id: n.id, name: n.name, lat: n.lat, lng: n.lng, type: n.type };
        }),
        edges: capturedEdges
      };

      fetch('/api/survey/batch', {
        method: 'POST',
        headers: surveyAuthHeaders(),
        body: JSON.stringify(payload)
      })
        .then(function (res) {
          if (!res.ok) {
            return res.json().then(function (err) {
              throw new Error(err.error || 'Save failed (HTTP ' + res.status + ')');
            });
          }
          return res.json();
        })
        .then(function (data) {
          saveResult.className = 'save-result';
          saveResult.textContent = 'Saved ' + data.nodes.length + ' nodes and ' +
            data.edges.length + ' edges to database.';
          // Clear session
          capturedNodes = [];
          capturedEdges = [];
          renderList();
          saveBtn.disabled = false;
          saveBtn.textContent = 'SAVE ALL TO DATABASE';
        })
        .catch(function (err) {
          saveResult.className = 'save-result error';
          saveResult.textContent = 'Error: ' + err.message +
            ' — your captured data is still in the page. Try again when signal returns.';
          saveBtn.disabled = false;
          saveBtn.textContent = 'SAVE ALL TO DATABASE (' + capturedNodes.length + ' pts)';
        });
    });

    // ── GPS tracking ─────────────────────────────────────
    function startGps() {
      if (!navigator.geolocation) {
        statusEl.textContent = 'Geolocation not available on this device.';
        return;
      }

      gpsWatchId = navigator.geolocation.watchPosition(
        function (pos) {
          currentLat = pos.coords.latitude;
          currentLng = pos.coords.longitude;
          currentAccuracy = pos.coords.accuracy;

          latEl.textContent = currentLat.toFixed(6);
          lngEl.textContent = currentLng.toFixed(6);
          accEl.textContent = 'Accuracy: ' + Math.round(currentAccuracy) + ' m';

          if (currentAccuracy <= 5) {
            statusEl.textContent = 'Signal: excellent';
            statusEl.style.color = '#2d7d46';
          } else if (currentAccuracy <= 10) {
            statusEl.textContent = 'Signal: good';
            statusEl.style.color = '#2d7d46';
          } else if (currentAccuracy <= 20) {
            statusEl.textContent = 'Signal: fair — wait for better fix';
            statusEl.style.color = '#c93400';
          } else {
            statusEl.textContent = 'Signal: weak — move to open area';
            statusEl.style.color = '#d94f14';
          }
        },
        function (err) {
          statusEl.textContent = 'GPS error: ' + err.message;
          statusEl.style.color = '#d94f14';
        },
        { enableHighAccuracy: true, maximumAge: 2000, timeout: 10000 }
      );
    }

    startGps();

    // ══════════════════════════════════════════════════════════════
    //  ADMIN PANEL (inline data review & editing)
    // ══════════════════════════════════════════════════════════════

    var adminNodes = [];
    var adminEdges = [];
    var adminPois = [];

    function loadAdminData() {
      return Promise.all([
        fetch('/api/graph').then(function (r) { return r.json(); }),
        fetch('/api/pois').then(function (r) { return r.json(); })
      ]).then(function (results) {
        adminNodes = results[0].nodes;
        adminEdges = results[0].edges;
        adminPois = results[1];
        renderAdmin();
      }).catch(function () { /* silent */ });
    }

    function renderAdmin() {
      renderAdminStats();
      renderAdminNodes();
      renderAdminEdges();
      renderAdminPois();
      renderAdminPoiDropdown();
      renderAdminConnectivity();
    }

    function renderAdminStats() {
      $('s-stat-nodes').textContent = adminNodes.length;
      $('s-stat-edges').textContent = adminEdges.length;
      $('s-stat-pois').textContent = adminPois.length;
      var edgeNodeIds = new Set();
      adminEdges.forEach(function (e) { edgeNodeIds.add(e.from_node_id); edgeNodeIds.add(e.to_node_id); });
      var isolated = adminNodes.filter(function (n) { return !edgeNodeIds.has(n.id); });
      $('s-stat-iso').textContent = isolated.length;
      $('s-stat-iso-card').className = 'stat-card' + (isolated.length > 0 ? ' warn' : '');
    }

    function typeOptions(selected) {
      var types = ['building_entrance','junction','gate','turning_point'];
      return types.map(function (t) { var sel = t === selected ? ' selected' : ''; return '<option' + sel + '>' + t + '</option>'; }).join('');
    }

    function renderAdminNodes() {
      var html = '';
      for (var i = 0; i < adminNodes.length; i++) {
        var n = adminNodes[i];
        html += '<tr>';
        html += '<td><code>' + escapeHtml(n.id) + '</code></td>';
        html += '<td><input class="sn-name" data-id="' + escapeHtml(n.id) + '" value="' + escapeHtml(n.name) + '" /></td>';
        html += '<td><select class="sn-type" data-id="' + escapeHtml(n.id) + '">' + typeOptions(n.type) + '</select></td>';
        html += '<td>' + n.lat.toFixed(5) + '</td><td>' + n.lng.toFixed(5) + '</td>';
        html += '<td><button class="inline-btn sn-save" data-id="' + escapeHtml(n.id) + '">SAVE</button> <button class="inline-btn danger sn-del" data-id="' + escapeHtml(n.id) + '">DEL</button></td>';
        html += '</tr>';
      }
      $('s-nodes-body').innerHTML = html;
      $('s-nodes-body').querySelectorAll('.sn-save').forEach(function (b) { b.addEventListener('click', onAdminNodeSave); });
      $('s-nodes-body').querySelectorAll('.sn-del').forEach(function (b) { b.addEventListener('click', onAdminNodeDelete); });
    }

    function onAdminNodeSave(e) {
      var id = e.target.dataset.id;
      var row = e.target.closest('tr');
      var name = row.querySelector('.sn-name').value.trim();
      var type = row.querySelector('.sn-type').value;
      fetch('/api/nodes/' + encodeURIComponent(id), {
        method: 'PUT', headers: surveyAuthHeaders(),
        body: JSON.stringify({ name: name, type: type })
      }).then(function (r) { if (!r.ok) throw new Error('Save failed'); return r.json(); })
        .then(loadAdminData)
        .catch(function (err) { alert('Error: ' + err.message); });
    }

    function onAdminNodeDelete(e) {
      var id = e.target.dataset.id;
      if (!confirm('Delete node "' + id + '" and all its edges and POIs?')) return;
      fetch('/api/nodes/' + encodeURIComponent(id), { method: 'DELETE', headers: surveyAuthHeaders() })
        .then(function (r) { if (!r.ok) throw new Error('Delete failed'); return r.json(); })
        .then(loadAdminData)
        .catch(function (err) { alert('Error: ' + err.message); });
    }

    function renderAdminEdges() {
      var html = '';
      for (var i = 0; i < adminEdges.length; i++) {
        var e = adminEdges[i];
        var fn = (adminNodes.find(function (n) { return n.id === e.from_node_id; }) || {}).name || e.from_node_id;
        var tn = (adminNodes.find(function (n) { return n.id === e.to_node_id; }) || {}).name || e.to_node_id;
        html += '<tr>';
        html += '<td>' + e.id + '</td>';
        html += '<td><code>' + escapeHtml(e.from_node_id) + '</code> <span style="color:var(--color-muted)">' + escapeHtml(fn) + '</span></td>';
        html += '<td><code>' + escapeHtml(e.to_node_id) + '</code> <span style="color:var(--color-muted)">' + escapeHtml(tn) + '</span></td>';
        html += '<td>' + Math.round(e.weight) + '</td>';
        html += '<td><select class="se-surface" data-id="' + e.id + '">' +
          '<option value="paved"' + (e.surface_type === 'paved' ? ' selected' : '') + '>Paved</option>' +
          '<option value="earthen"' + (e.surface_type === 'earthen' ? ' selected' : '') + '>Earthen</option>' +
          '</select></td>';
        html += '<td><button class="inline-btn se-save" data-id="' + e.id + '">SAVE</button> <button class="inline-btn danger se-del" data-id="' + e.id + '">DEL</button></td>';
        html += '</tr>';
      }
      $('s-edges-body').innerHTML = html;
      $('s-edges-body').querySelectorAll('.se-save').forEach(function (b) { b.addEventListener('click', onAdminEdgeSave); });
      $('s-edges-body').querySelectorAll('.se-del').forEach(function (b) { b.addEventListener('click', onAdminEdgeDelete); });
    }

    function onAdminEdgeSave(e) {
      var id = e.target.dataset.id;
      var row = e.target.closest('tr');
      var surface = row.querySelector('.se-surface').value;
      fetch('/api/edges/' + id, {
        method: 'PUT', headers: surveyAuthHeaders(),
        body: JSON.stringify({ surface_type: surface })
      }).then(function (r) { if (!r.ok) throw new Error('Save failed'); return r.json(); })
        .then(loadAdminData)
        .catch(function (err) { alert('Error: ' + err.message); });
    }

    function onAdminEdgeDelete(e) {
      var id = e.target.dataset.id;
      if (!confirm('Delete edge #' + id + '?')) return;
      fetch('/api/edges/' + id, { method: 'DELETE', headers: surveyAuthHeaders() })
        .then(function (r) { if (!r.ok) throw new Error('Delete failed'); return r.json(); })
        .then(loadAdminData)
        .catch(function (err) { alert('Error: ' + err.message); });
    }

    function renderAdminPois() {
      var html = '';
      for (var i = 0; i < adminPois.length; i++) {
        var p = adminPois[i];
        var nn = (adminNodes.find(function (n) { return n.id === p.node_id; }) || {}).name || p.node_id;
        html += '<tr><td>' + p.id + '</td><td>' + escapeHtml(p.name) + '</td>';
        html += '<td><code>' + escapeHtml(p.node_id) + '</code> <span style="color:var(--color-muted)">' + escapeHtml(nn) + '</span></td>';
        html += '<td><button class="inline-btn danger sp-del" data-id="' + p.id + '">DEL</button></td></tr>';
      }
      $('s-pois-body').innerHTML = html;
      $('s-pois-body').querySelectorAll('.sp-del').forEach(function (b) { b.addEventListener('click', onAdminPoiDelete); });
    }

    function onAdminPoiDelete(e) {
      var id = e.target.dataset.id;
      if (!confirm('Delete this POI?')) return;
      fetch('/api/pois/' + id, { method: 'DELETE', headers: surveyAuthHeaders() })
        .then(function (r) { if (!r.ok) throw new Error('Delete failed'); return r.json(); })
        .then(loadAdminData)
        .catch(function (err) { alert('Error: ' + err.message); });
    }

    function renderAdminPoiDropdown() {
      var sel = $('s-poi-node');
      sel.innerHTML = adminNodes.map(function (n) {
        return '<option value="' + escapeHtml(n.id) + '">' + escapeHtml(n.name) + ' (' + escapeHtml(n.id) + ')</option>';
      }).join('');
    }

    $('s-poi-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var nodeId = $('s-poi-node').value;
      var name = $('s-poi-name').value.trim();
      if (!name) { alert('Enter a POI name.'); return; }
      fetch('/api/pois', {
        method: 'POST', headers: surveyAuthHeaders(),
        body: JSON.stringify({ name: name, node_id: nodeId })
      }).then(function (r) { if (!r.ok) return r.json().then(function (j) { throw new Error(j.error); }); return r.json(); })
        .then(function () { $('s-poi-name').value = ''; loadAdminData(); })
        .catch(function (err) { alert('Error: ' + err.message); });
    });

    function renderAdminConnectivity() {
      var edgeNodeIds = new Set();
      adminEdges.forEach(function (e) { edgeNodeIds.add(e.from_node_id); edgeNodeIds.add(e.to_node_id); });
      var isolated = adminNodes.filter(function (n) { return !edgeNodeIds.has(n.id); });
      var html = '';
      if (isolated.length === 0) {
        html += '<p class="ok">All ' + adminNodes.length + ' nodes are connected to at least one edge.</p>';
      } else {
        html += '<p class="bad">' + isolated.length + ' node(s) have no edges:</p><ul>';
        for (var i = 0; i < isolated.length; i++) {
          html += '<li class="bad">' + escapeHtml(isolated[i].name) + ' (' + escapeHtml(isolated[i].id) + ')</li>';
        }
        html += '</ul>';
      }
      html += '<p style="margin-top:var(--space-sm);font-size:0.78rem;color:var(--color-muted);">Total edges: ' + adminEdges.length + ' &middot; Connected nodes: ' + edgeNodeIds.size + ' of ' + adminNodes.length + '</p>';
      $('s-conn-list').innerHTML = html;
    }

    // ── Admin Panel toggle ──────────────────────────────
    $('admin-toggle-btn').addEventListener('click', function () {
      var panel = $('survey-admin-panel');
      var hidden = panel.style.display === 'none';
      panel.style.display = hidden ? 'block' : 'none';
      this.textContent = hidden ? 'HIDE ADMIN PANEL' : 'SHOW ADMIN PANEL';
      if (hidden) loadAdminData();
    });

    // ══════════════════════════════════════════════════════════════
  </script>
</body>
</html>
